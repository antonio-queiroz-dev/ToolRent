spring:
  application:
    name: toolrent

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/toolrent}
    username: ${DB_USER:toolrent}
    password: ${DB_PASSWORD:toolrent}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
