services:
  postgres:
    image: postgres:16-alpine
    container_name: toolrent-postgres
    environment:
      POSTGRES_DB: toolrent
      POSTGRES_USER: toolrent
      POSTGRES_PASSWORD: toolrent
    ports:
      - "5432:5432"
    volumes:
      - toolrent-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolrent -d toolrent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  toolrent-pg-data:
